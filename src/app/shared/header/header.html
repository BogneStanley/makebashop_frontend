<div class="h-20"></div>
<header class="fixed top-0 left-0 right-0 z-10 bg-[#faf6f0]/80 backdrop-blur-md border-b border-amber-100/40 h-20">
  <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
    <!-- Mobile: Logo on left, icons on right -->
    <div class="flex items-center md:hidden">
      <a routerLink="/" class="text-2xl font-bold tracking-wider text-gray-900">MAKEBA</a>
    </div>

    <!-- Mobile: Icons on right -->
    <div class="flex items-center md:hidden space-x-2">
      <p-button
        icon="pi pi-shopping-cart"
        [rounded]="true"
        [text]="true"
        [severity]="'secondary'"
        size="large"
        ariaLabel="Panier"
      >
        @if (cartItemsCount() > 0) {
          <span class="ml-2 text-sm font-medium">{{ cartItemsCount() }}</span>
        }
      </p-button>

      <p-button
        icon="pi pi-bars"
        [rounded]="true"
        [text]="true"
        [severity]="'secondary'"
        size="large"
        ariaLabel="Menu"
        (onClick)="toggleMenu()"
      ></p-button>
    </div>

    <!-- Desktop: Centered navigation -->
    <nav class="hidden md:flex items-center space-x-8">
      <a
        routerLink="/"
        class="text-gray-800 font-medium tracking-wide hover:text-amber-600 transition-colors"
        >Accueil</a
      >
      <a
        routerLink="/products"
        class="text-gray-800 font-medium tracking-wide hover:text-amber-600 transition-colors"
        >Produits</a
      >
    </nav>

    <!-- Desktop: Centered logo -->
    <div class="hidden md:block absolute left-1/2 transform -translate-x-1/2">
      <a routerLink="/" class="text-2xl font-bold tracking-wider text-gray-900">MAKEBA</a>
    </div>

    <!-- Desktop: Cart on right -->
    <div class="hidden md:flex items-center">
      <p-button
        icon="pi pi-shopping-cart"
        [rounded]="true"
        [text]="true"
        [severity]="'secondary'"
        size="large"
        ariaLabel="Panier"
      >
        @if (cartItemsCount() > 0) {
          <span class="ml-2 text-sm font-medium">{{ cartItemsCount() }}</span>
        }
      </p-button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div
    class="fixed inset-0 bg-[#faf6f0] bg-opacity-100 z-40 md:hidden transition-opacity duration-300"
    [class.pointer-events-none]="!isMenuOpen()"
    [class.opacity-0]="!isMenuOpen()"
    [class.opacity-100]="isMenuOpen()"
  ></div>

  <!-- Mobile Menu -->
  <nav
    class="fixed left-0 right-0 bg-[#faf6f0] md:hidden z-50 transform transition-transform duration-300 ease-in-out border-b border-amber-100/40"
    [class.translate-x-full]="!isMenuOpen()"
    [class.translate-x-0]="isMenuOpen()"
  >
    <div class="flex flex-col py-4 px-6">
      <p-button
        icon="pi pi-times"
        [rounded]="true"
        [text]="true"
        [severity]="'secondary'"
        size="large"
        ariaLabel="Panier"
        class="self-end mb-4"
        (onClick)="toggleMenu()"
      />

      <a
        routerLink="/"
        (click)="isMenuOpen.set(false)"
        class="py-3 text-gray-800 font-medium text-lg hover:text-amber-600 transition-colors border-b border-gray-100"
        >Accueil</a
      >
      <a
        routerLink="/products"
        (click)="isMenuOpen.set(false)"
        class="py-3 text-gray-800 font-medium text-lg hover:text-amber-600 transition-colors"
        >Produits</a
      >
    </div>
  </nav>
</header>
