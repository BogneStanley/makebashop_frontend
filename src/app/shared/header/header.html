<header class="relative bg-white border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
    <nav class="flex items-center space-x-8">
      <a
        routerLink="/"
        class="text-gray-800 font-medium tracking-wide hover:text-amber-600 transition-colors"
        >Accueil</a
      >
      <a
        routerLink="/products"
        class="text-gray-800 font-medium tracking-wide hover:text-amber-600 transition-colors"
        >Produits</a
      >
    </nav>

    <div class="absolute left-1/2 transform -translate-x-1/2">
      <a routerLink="/" class="text-2xl font-bold tracking-wider text-gray-900">MAKEBA</a>
    </div>

    <div class="flex items-center">
      <p-button
        icon="pi pi-shopping-cart"
        [rounded]="true"
        [text]="true"
        [severity]="'secondary'"
        size="large"
        ariaLabel="Panier"
      >
        @if (cartItemsCount() > 0) {
          <span class="ml-2 text-sm font-medium">{{ cartItemsCount() }}</span>
        }
      </p-button>
    </div>
  </div>
</header>
