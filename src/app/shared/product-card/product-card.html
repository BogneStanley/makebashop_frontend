<a
  class="product-card cursor-pointer block no-underline"
  [routerLink]="['/products', product().id]"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <div class="relative h-96 overflow-hidden bg-gray-100">
    <img
      [src]="image"
      [alt]="name"
      class="w-full h-full object-cover transition-transform duration-500"
      [class.scale-105]="isHovered()"
    />

    <div
      class="absolute inset-0 bg-linear-to-t from-black/50 via-black/30 to-transparent pointer-events-none"
    ></div>

    <div class="absolute bottom-0 left-0 right-0 p-4 text-white transition-all duration-300">
      <h3 class="font-semibold text-lg mb-1 line-clamp-1">{{ name }}</h3>
      <p class="font-bold text-xl text-amber-400">
        {{ price | currency: 'FCFA' : 'symbol' : '1.0-0' : 'fr-FR' }}
      </p>
    </div>
  </div>
</a>
