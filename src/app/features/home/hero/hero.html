<!-- Hero that contains image at right and text at left -->
<section class="relative max-w-7xl h-[65vh] min-h-100 mx-auto">
  <div class="w-full h-full flex px-6 items-center gap-12">
    <div class="flex-1">
      <h1 class="text-5xl md:text-6xl font-thin mb-6 tracking-tight text-gray-900 leading-tight">
        {{ title() }}
      </h1>
      <p class="text-base md:text-lg mb-10 font-light text-gray-500 max-w-md leading-relaxed">
        {{ subtitle() }}
      </p>
      <div class="flex items-center gap-4">
        <a
          class="bg-amber-700 hover:bg-amber-800 text-white font-medium px-8 py-4 text-sm tracking-wider uppercase transition-all duration-300 cursor-pointer"
          [routerLink]="ctaLink()"
        >
          {{ ctaText() }}
        </a>
      </div>
    </div>
    <div class="relative flex-1 h-full flex items-center justify-end">
      <img
        src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=736&auto=format&fit=crop"
        alt="Hero Image"
        class="relative inset-y-0 right-0 h-120 w-120 rounded-tl-[80px] object-cover"
      />
    </div>
  </div>
</section>
