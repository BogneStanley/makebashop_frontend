<section class="relative h-[80vh] min-h-[600px] bg-cover bg-center flex items-center justify-center" 
         style="background-image: url('https://images.unsplash.com/photo-1483985981027-ebd2d80a3400?auto=format&fit=crop&w=1920&q=80');">
  <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>
  <div class="relative z-10 max-w-2xl px-6 text-left">
    <h1 class="text-5xl md:text-6xl font-thin text-white mb-6 tracking-tight">{{ title }}</h1>
    <p class="text-lg md:text-xl text-gray-200 mb-8 font-light">{{ subtitle }}</p>
    <p-button 
      [label]="ctaText" 
      [routerLink]="ctaLink"
      [raised]="true"
      styleClass="bg-amber-600 hover:bg-amber-700 border-amber-600"
    ></p-button>
  </div>
</section>
