<div
  class="flex items-center gap-3 rounded-none border border-gray-200 bg-white px-3 py-2"
  [class.border-red-400]="invalid()"
>
  <input
    type="color"
    [ngModel]="pickerValue()"
    (ngModelChange)="onPickerChange($event)"
    class="variant-color-picker"
    [disabled]="disabled()"
    aria-label="Choisir une couleur"
  />
  <span class="text-xs font-mono tracking-wide text-gray-600">{{ pickerValue() }}</span>
</div>
