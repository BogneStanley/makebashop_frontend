<div class="border-b border-amber-100/50 py-8 md:py-10">
  <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 md:flex-row md:items-end md:justify-between md:px-6">
    <div>
      <p-button
        label="Retour à la liste"
        icon="pi pi-arrow-left"
        severity="secondary"
        [text]="true"
        styleClass="mb-3 -ml-2 text-xs uppercase tracking-wider"
        [disabled]="saving()"
        (onClick)="back.emit()"
      />
      <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.3em] text-amber-600">
        Administration
      </span>
      <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-3xl font-thin tracking-wide text-gray-900 md:text-4xl">
          {{ product().name }}
        </h1>
        <app-product-status-badge [isActive]="product().isActive" />
      </div>
      <div class="mt-3 h-0.5 w-16 bg-amber-600"></div>
      <p class="mt-4 max-w-2xl text-sm font-light leading-relaxed text-gray-500">
        Modifier les informations, variantes et images du produit.
      </p>
    </div>

    <div class="flex flex-wrap gap-2 self-start md:self-auto">
      @if (product().isActive) {
        <p-button
          label="Désactiver"
          icon="pi pi-ban"
          severity="secondary"
          [outlined]="true"
          styleClass="rounded-0 text-xs uppercase tracking-wider font-semibold"
          [disabled]="saving()"
          (onClick)="deactivate.emit()"
        />
      } @else {
        <p-button
          label="Activer"
          icon="pi pi-check-circle"
          styleClass="bg-amber-600 border-amber-600 hover:bg-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold"
          [disabled]="saving()"
          (onClick)="activate.emit()"
        />
      }
      <p-button
        label="Supprimer"
        icon="pi pi-trash"
        severity="danger"
        [outlined]="true"
        styleClass="rounded-0 text-xs uppercase tracking-wider font-semibold"
        [disabled]="saving()"
        (onClick)="delete.emit()"
      />
    </div>
  </div>
</div>
