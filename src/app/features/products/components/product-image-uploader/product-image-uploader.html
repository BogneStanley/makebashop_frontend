<div class="border border-gray-100 bg-white p-5 md:p-6">
  <h2 class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-900">Images</h2>

  <label
    class="flex cursor-pointer flex-col items-center justify-center border border-dashed border-gray-200 bg-amber-50/20 px-6 py-10 transition-colors hover:border-amber-300 hover:bg-amber-50/40"
    [class.pointer-events-none]="disabled() || files().length >= maxFiles()"
    [class.opacity-50]="disabled() || files().length >= maxFiles()"
  >
    <i class="pi pi-cloud-upload mb-3 text-3xl text-amber-600"></i>
    <span class="text-sm font-light text-gray-700">Glissez ou cliquez pour ajouter des images</span>
    <span class="mt-1 text-xs font-light text-gray-400">
      {{ files().length }} / {{ maxFiles() }} fichier(s)
    </span>
    <input
      type="file"
      accept="image/*"
      multiple
      class="hidden"
      [disabled]="disabled() || files().length >= maxFiles()"
      (change)="onFileSelect($event)"
    />
  </label>

  @if (previews().length) {
    <div class="mt-5 grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4">
      @for (preview of previews(); track preview; let index = $index) {
        <div class="group relative border border-gray-100">
          <img [src]="preview" alt="Aperçu" class="aspect-square w-full object-cover" />
          <p-button
            icon="pi pi-times"
            [rounded]="true"
            severity="danger"
            size="small"
            styleClass="absolute right-2 top-2 opacity-0 group-hover:opacity-100 transition-opacity"
            [disabled]="disabled()"
            (onClick)="onRemove(index)"
          />
        </div>
      }
    </div>
  }
</div>
