<div class="border border-gray-100 bg-white p-4 md:p-5">
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4 lg:items-end">
    <div class="lg:col-span-2">
      <label for="product-filter-name" class="mb-2 block text-xs font-semibold uppercase tracking-wider text-gray-900">
        Nom
      </label>
      <input
        id="product-filter-name"
        type="text"
        pInputText
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        (keyup.enter)="onSearch()"
        placeholder="Rechercher par nom…"
        class="w-full border-gray-200 focus:border-amber-500 rounded-0 font-light py-2.5 text-sm"
        [disabled]="disabled()"
      />
    </div>

    <div>
      <label for="product-filter-status" class="mb-2 block text-xs font-semibold uppercase tracking-wider text-gray-900">
        Statut
      </label>
      <p-select
        inputId="product-filter-status"
        [options]="activeFilterOptions"
        [ngModel]="activeFilter()"
        (ngModelChange)="activeFilter.set($event); emitFilters()"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full"
        [disabled]="disabled()"
      />
    </div>

    <div class="flex flex-col gap-3">
      <div class="flex items-center gap-2">
        <p-checkbox
          inputId="product-filter-instock-enable"
          [binary]="true"
          [ngModel]="inStockFilterEnabled()"
          (ngModelChange)="onInStockToggle($event)"
          [disabled]="disabled()"
        />
        <label for="product-filter-instock-enable" class="text-sm font-light text-gray-700">
          Filtrer par stock
        </label>
      </div>
      @if (inStockFilterEnabled()) {
        <div class="flex items-center gap-2">
          <p-checkbox
            inputId="product-filter-instock"
            [binary]="true"
            [ngModel]="inStockOnly()"
            (ngModelChange)="inStockOnly.set($event); emitFilters()"
            [disabled]="disabled()"
          />
          <label for="product-filter-instock" class="text-sm font-light text-gray-700">
            En stock uniquement
          </label>
        </div>
      }
    </div>
  </div>

  <div class="mt-4 flex flex-wrap gap-2">
    <p-button
      label="Rechercher"
      icon="pi pi-search"
      styleClass="bg-amber-600 border-amber-600 hover:bg-amber-700 hover:border-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold"
      [disabled]="disabled()"
      (onClick)="onSearch()"
    />
    <p-button
      label="Réinitialiser"
      icon="pi pi-refresh"
      severity="secondary"
      [text]="true"
      [disabled]="disabled()"
      (onClick)="onReset()"
    />
  </div>
</div>
