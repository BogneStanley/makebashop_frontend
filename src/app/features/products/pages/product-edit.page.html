@if (loading()) {
  <section class="mx-auto max-w-7xl px-4 py-16 md:px-6">
    <div class="flex flex-col items-center justify-center text-center">
      <i class="pi pi-spin pi-spinner mb-4 text-3xl text-amber-600"></i>
      <p class="text-sm font-light text-gray-500">Chargement du produit…</p>
    </div>
  </section>
} @else if (error() || !product()) {
  <section class="mx-auto max-w-7xl px-4 py-16 md:px-6">
    <p-message severity="error" [text]="error() ?? 'Produit introuvable.'" styleClass="w-full" />
    <div class="mt-6">
      <p-button label="Retour à la liste" icon="pi pi-arrow-left" severity="secondary" [text]="true" (onClick)="back()" />
    </div>
  </section>
} @else {
  <section>
    <app-product-edit-header
      [product]="product()!"
      [saving]="saving()"
      (activate)="activate()"
      (deactivate)="deactivate()"
      (delete)="requestDeleteProduct()"
      (back)="back()"
    />

    <div class="mx-auto max-w-7xl px-4 py-8 md:px-6 md:py-12">
      <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
        <p-tablist>
          <p-tab value="general">Général</p-tab>
          <p-tab value="variants">Variantes</p-tab>
          <p-tab value="images">Images</p-tab>
        </p-tablist>

        <p-tabpanels>
          <p-tabpanel value="general">
            <div class="space-y-6 pt-6">
              <app-product-general-form
                [value]="general()"
                [categories]="categories()"
                [showIsActive]="true"
                [showValidation]="showGeneralValidation()"
                [disabled]="saving()"
                (valueChange)="general.set($event)"
                (validityChange)="generalFormValid.set($event)"
              />
              <div class="flex justify-end border border-gray-100 bg-white p-4 md:p-5">
                <p-button
                  label="Enregistrer"
                  icon="pi pi-check"
                  [loading]="saving()"
                  styleClass="bg-amber-600 border-amber-600 hover:bg-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold"
                  (onClick)="saveGeneral()"
                />
              </div>
            </div>
          </p-tabpanel>

          <p-tabpanel value="variants">
            <div class="space-y-6 pt-6">
              <app-product-variant-table
                [variants]="variants()"
                [editMode]="true"
                [showValidation]="showVariantsValidation()"
                [disabled]="saving()"
                (variantsChange)="variants.set($event)"
                (deleteVariants)="onDeleteVariants($event)"
              />
              <div class="flex justify-end border border-gray-100 bg-white p-4 md:p-5">
                <p-button
                  label="Enregistrer"
                  icon="pi pi-check"
                  [loading]="saving()"
                  styleClass="bg-amber-600 border-amber-600 hover:bg-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold"
                  (onClick)="saveVariants()"
                />
              </div>
            </div>
          </p-tabpanel>

          <p-tabpanel value="images">
            <div class="pt-6">
              <app-product-image-gallery
                [images]="images()"
                [disabled]="saving()"
                (setPrimary)="onSetPrimary($event)"
                (deleteImages)="onDeleteImages($event)"
                (reorder)="onImagesReorder($event)"
                (upload)="onUploadImages($event)"
              />
            </div>
          </p-tabpanel>
        </p-tabpanels>
      </p-tabs>
    </div>
  </section>
}

<app-confirm-dialog
  [visible]="confirmVisible()"
  [data]="confirmData()"
  (visibleChange)="confirmVisible.set($event)"
  (confirm)="confirmActionHandler()"
/>
