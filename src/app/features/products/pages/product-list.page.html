<section>
  <div class="border-b border-amber-100/50 py-8 md:py-10">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 md:flex-row md:items-end md:justify-between md:px-6">
      <div>
        <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.3em] text-amber-600">
          Administration
        </span>
        <h1 class="text-3xl font-thin tracking-wide text-gray-900 md:text-4xl">Produits</h1>
        <div class="mt-3 h-0.5 w-16 bg-amber-600"></div>
        <p class="mt-4 max-w-2xl text-sm font-light leading-relaxed text-gray-500">
          Gérez le catalogue produits, les variantes et les images.
        </p>
      </div>

      <p-button
        label="Ajouter un produit"
        icon="pi pi-plus"
        styleClass="self-start bg-amber-600 border-amber-600 hover:bg-amber-700 hover:border-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold md:self-auto"
        (onClick)="goToCreate()"
      />
    </div>
  </div>

  <div class="mx-auto max-w-7xl space-y-6 px-4 py-8 md:px-6 md:py-12">
    @if (error()) {
      <p-message severity="error" [text]="error()!" styleClass="w-full" />
    }

    <app-product-filters [disabled]="loading()" (filtersChange)="onFiltersChange($event)" />

    <app-product-table
      [products]="paginatedProducts()"
      [loading]="loading()"
      (edit)="onEdit($event)"
      (activate)="onActivate($event)"
      (deactivate)="onDeactivate($event)"
      (delete)="onDeleteRequest($event)"
    />

    @if (!loading() && totalElements() > 0) {
      <p-paginator
        [rows]="pageSize()"
        [totalRecords]="totalElements()"
        [first]="page() * pageSize()"
        [rowsPerPageOptions]="[5, 10, 20]"
        (onPageChange)="onPageChange($event)"
        styleClass="border border-gray-100 bg-white rounded-none"
      />
    }
  </div>
</section>

<app-confirm-dialog
  [visible]="confirmVisible()"
  [data]="confirmData()"
  (visibleChange)="confirmVisible.set($event)"
  (confirm)="confirmDelete()"
/>
