<div class="space-y-8">
  <div>
    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-900">Vue d’ensemble</h2>
    <p class="mt-2 text-sm font-light leading-relaxed text-gray-500">
      Choisissez une catégorie de paramètres à configurer.
    </p>
  </div>

  @for (group of groups; track group.category) {
    <div>
      <h3 class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-amber-600">
        {{ group.category }}
      </h3>
      <ul class="grid grid-cols-1 gap-3 md:grid-cols-2">
        @for (item of group.items; track item.route) {
          <li>
            <a
              [routerLink]="['/manage/settings', item.route]"
              class="flex h-full items-start gap-4 border border-gray-100 bg-white p-5 transition-colors hover:border-amber-200 hover:bg-amber-50/50"
            >
              <span
                class="flex h-10 w-10 shrink-0 items-center justify-center border border-amber-100 bg-amber-50 text-amber-700"
              >
                <i [class]="item.icon"></i>
              </span>
              <span class="min-w-0 flex-1">
                <span class="block text-sm font-medium text-gray-900">{{ item.label }}</span>
                <span class="mt-1 block text-sm font-light leading-relaxed text-gray-500">
                  {{ item.description }}
                </span>
              </span>
              <i class="pi pi-arrow-right mt-1 shrink-0 text-xs text-gray-400"></i>
            </a>
          </li>
        }
      </ul>
    </div>
  }
</div>
