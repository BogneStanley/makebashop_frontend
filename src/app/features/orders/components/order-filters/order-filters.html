<div class="flex flex-col gap-3 border border-gray-100 bg-white p-4 md:flex-row md:items-center md:justify-between md:p-5">
  <p-iconfield class="w-full md:max-w-md">
    <p-inputicon class="pi pi-search" />
    <input
      type="text"
      pInputText
      [ngModel]="orderNumber()"
      (ngModelChange)="onOrderNumberChange($event)"
      placeholder="Rechercher par n° de commande…"
      class="w-full border-gray-200 focus:border-amber-500 rounded-0 font-light py-2.5 text-sm"
      [disabled]="disabled()"
    />
  </p-iconfield>

  <p-button
    label="Filtres"
    icon="pi pi-filter"
    severity="secondary"
    [outlined]="true"
    styleClass="self-start rounded-0 text-xs uppercase tracking-wider font-semibold md:self-auto"
    [disabled]="disabled()"
    (onClick)="openDrawer()"
  />
</div>

<p-drawer
  header="Filtres avancés"
  position="right"
  [modal]="true"
  appendTo="body"
  [visible]="drawerOpen()"
  [style]="{ width: 'min(28rem, 100vw)' }"
  styleClass="order-filters-drawer"
  (onHide)="closeDrawer()"
>
  <div class="space-y-5">
    <div>
      <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-gray-900">
        Statut
      </label>
      <p-select
        [options]="statusOptions"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full"
        [disabled]="disabled()"
      />
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-gray-900">
          Date début
        </label>
        <input
          type="date"
          [ngModel]="startDate()"
          (ngModelChange)="startDate.set($event)"
          class="w-full border border-gray-200 px-3 py-2.5 text-sm font-light focus:border-amber-500 focus:outline-none"
          [disabled]="disabled()"
        />
      </div>
      <div>
        <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-gray-900">
          Date fin
        </label>
        <input
          type="date"
          [ngModel]="endDate()"
          (ngModelChange)="endDate.set($event)"
          class="w-full border border-gray-200 px-3 py-2.5 text-sm font-light focus:border-amber-500 focus:outline-none"
          [disabled]="disabled()"
        />
      </div>
    </div>
  </div>

  <ng-template #footer>
    <div class="flex justify-between gap-2">
      <p-button
        label="Réinitialiser"
        icon="pi pi-refresh"
        severity="secondary"
        [text]="true"
        type="button"
        [disabled]="disabled()"
        (onClick)="resetDrawerFilters()"
      />
      <div class="flex gap-2">
        <p-button
          label="Annuler"
          severity="secondary"
          [text]="true"
          type="button"
          (onClick)="closeDrawer()"
        />
        <p-button
          label="Appliquer"
          icon="pi pi-check"
          styleClass="bg-amber-600 border-amber-600 hover:bg-amber-700 rounded-0 text-xs uppercase tracking-wider font-semibold"
          [disabled]="disabled()"
          (onClick)="applyDrawerFilters()"
        />
      </div>
    </div>
  </ng-template>
</p-drawer>
