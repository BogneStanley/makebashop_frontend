<section>
  <div class="border-b border-amber-100/50 py-8 md:py-10">
    <div class="mx-auto max-w-7xl px-4 md:px-6">
      <span class="mb-2 block text-xs font-semibold uppercase tracking-[0.3em] text-amber-600">
        Administration
      </span>
      <h1 class="text-3xl font-thin tracking-wide text-gray-900 md:text-4xl">Commandes</h1>
      <div class="mt-3 h-0.5 w-16 bg-amber-600"></div>
      <p class="mt-4 max-w-2xl text-sm font-light leading-relaxed text-gray-500">
        Consultez et gérez les commandes clients.
      </p>
    </div>
  </div>

  <div class="mx-auto max-w-7xl space-y-6 px-4 py-8 md:px-6 md:py-12">
    @if (error()) {
      <p-message severity="error" [text]="error()!" styleClass="w-full" />
    }

    <app-order-filters
      [filters]="filters()"
      [disabled]="loading()"
      (filtersChange)="onFiltersChange($event)"
    />

    <app-order-table
      [orders]="paginatedOrders()"
      [loading]="loading()"
      [activeFilters]="activeFilterLabels()"
      (view)="onView($event)"
      (markPaid)="onMarkPaidRequest($event)"
      (markCancelled)="onMarkCancelledRequest($event)"
      (clearFilters)="clearAllFilters()"
    />

    @if (!loading() && totalElements() > 0) {
      <p-paginator
        [rows]="pageSize()"
        [totalRecords]="totalElements()"
        [first]="page() * pageSize()"
        [rowsPerPageOptions]="[5, 10, 20]"
        (onPageChange)="onPageChange($event)"
        styleClass="border border-gray-100 bg-white rounded-none"
      />
    }
  </div>
</section>

<app-confirm-dialog
  [visible]="confirmVisible()"
  [data]="confirmData()"
  (visibleChange)="confirmVisible.set($event)"
  (confirm)="confirmAction()"
/>
