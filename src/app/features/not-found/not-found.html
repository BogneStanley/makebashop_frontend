<app-header></app-header>

<main class="min-h-screen bg-[#faf6f0]">
  <div class="max-w-7xl mx-auto px-6 py-24 md:py-32 text-center">
    <span class="text-xs tracking-[0.3em] uppercase text-amber-600 font-semibold mb-4 block">
      Erreur 404
    </span>
    <p class="text-8xl md:text-9xl font-thin text-gray-900 tracking-wide leading-none mb-6">
      404
    </p>
    <div class="w-16 h-0.5 bg-amber-600 mx-auto mb-8"></div>
    <h1 class="text-2xl md:text-3xl font-light text-gray-900 mb-4 tracking-wide">
      Page introuvable
    </h1>
    <p class="text-sm font-light text-gray-500 mb-10 max-w-md mx-auto leading-relaxed">
      La page que vous recherchez n'existe pas ou a été déplacée. Retournez à l'accueil ou
      explorez nos collections.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <button
        pButton
        type="button"
        label="Retour à l'accueil"
        icon="pi pi-home"
        class="bg-amber-600 border-amber-600 hover:bg-amber-700 hover:border-amber-700 px-6 py-2.5 rounded-0 font-medium text-sm text-white uppercase tracking-wider"
        routerLink="/"
      ></button>
      <button
        pButton
        type="button"
        label="Voir les produits"
        icon="pi pi-arrow-right"
        [text]="true"
        class="text-sm font-medium text-gray-700 hover:text-amber-600"
        routerLink="/products"
      ></button>
    </div>
  </div>
</main>

<app-footer></app-footer>
